  - id: docs-data
    title: 'Criar documentação sobre dados necessários e como obter do TSE'
    prompt: |
      Criar arquivo de documentação sobre dados eleitorais do TSE.
      
      Pasta de trabalho: /Users/fagnerdossgoncalves/wwwroot/lab/dados-eleicoes-basicos/app-python-minimax
      
      ## Arquivo: DADOS_TSE.md
      
      Conteúdo:
      
      # Dados Eleitorais do TSE - Guia de Importação
      
      ## Dados Disponíveis no Banco
      O banco PostgreSQL 'eleicoes' já contém:
      - `boletim_de_urna` (~4M linhas) - votos por seção
      - `consulta_cand` (~463K linhas) - dados de candidatos
      - `consulta_vagas` (~16K linhas) - vagas por cargo
      - `estados` (~27 linhas) - lista de estados
      - `local_votacao` (~599K linhas) - locais de votação (PRECISA VERIFICAR SE TEM DADOS)
      - `municipios` (~5K linhas) - lista de municípios
      - `votos_candidatos` (~138K linhas) - votos agregados por candidato
      - `votos_partido` (~26K linhas) - votos agregados por partido
      
      ## Dados que Podem Faltar
      1. **local_votacao** - Verificar se tem dados. Se vazio, importar de:
         - https://dadosabertos.tse.jus.br/dataset/local-votacao
         - Arquivo: localvotacao_{ano}.csv
      
      2. **Perfil do electorado** (abstenção por idade/escolaridade) - Não existe no banco atual.
         Para obter:
         - https://dadosabertos.tse.jus.br/dataset/perfil-eleitorado
         - Criar nova tabela `perfil_eleitorado` com esses dados
      
      3. **Coordenadas GPS** - Verificar se local_votacao tem NR_LATITUDE/NR_LONGITUDE.
         Sem isso, mapas de bolhas não funcionam.
      
      ## Como Importar Dados do TSE
      
      ### Opção 1: Usar scripts Go existentes
      Pasta: ../go_postgres/
      Scripts disponíveis:
      - 1_import_boletim_urna.go
      - 2_import_consulta_cand.go
      - 3_import_consulta_vagas.go
      - 4_create_table_votos_candidatos.go
      - 5_create_table_votos_partido.go
