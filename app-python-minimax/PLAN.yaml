      ## Validação dos Dados
      
      Queries úteis para verificar:
      ```sql
      -- Verificar anos disponíveis
      SELECT DISTINCT "ANO_ELEICAO" FROM boletim_de_urna ORDER BY 1;
      
      -- Verificar se local_votacao tem dados
      SELECT COUNT(*) FROM local_votacao;
      
      -- Verificar coordenadas
      SELECT COUNT(*) FROM local_votacao WHERE "NR_LATITUDE" NOT IN ('-1', '') AND "NR_LATITUDE" IS NOT NULL;
      ```
      
      ## Placeholders Implementados
      
      O app já contém tratamento para dados faltantes:
      - Se local_votacao vazio: mapas mostram tabela em vez de mapa
      - Se coordenadas não existem: mostra lista em vez de bolhas
      - Se ano anterior não existe: mostra só ano atual
      - Se dados de perfil não existem: mostra mensagem explicativa
