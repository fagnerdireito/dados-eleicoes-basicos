version: 1
plan:
  name: 'app-python-minimax - Streamlit Election Dashboard'
  max_concurrency: 10
  max_consecutive_failures: 2
  max_cycles: 15

tasks:
  - id: base-infra
    title: 'Criar infraestrutura base (db.py, queries.py, requirements.txt, __init__.py)'
    prompt: |
      Criar a estrutura base do projeto Streamlit para análise de dados eleitorais.
      
      Pasta de trabalho: /Users/fagnerdossgoncalves/wwwroot/lab/dados-eleicoes-basicos/app-python-minimax
      
      Estrutura de pastas já criada:
      - ui/ (vazio)
      - db/ (vazio)
      - config/ (vazio)
      - assets/ (vazio)
      
      ## 1. requirements.txt
      Criar arquivo com dependências:
      ```
      streamlit>=1.39
      pandas>=2.2
      pyarrow>=15
      sqlalchemy>=2
      psycopg2-binary>=2.9
      plotly>=5.20
      python-dotenv>=1.0
      babel>=2.14
      ```
      
      ## 2. db/__init__.py
      Exportar funções de conexão.
      
      ## 3. db/connection.py
      - Função get_engine() com cache @st.cache_resource
      - Função run_df(sql, params) para executar queries e retornar DataFrames
      - Função table_exists(name) para verificar tabelas
      - Função is_municipal(ano) - retorna True se ano é municipal (2020, 2024, etc.)
      - Usar connection string: postgresql://fagnerdossgoncalves@127.0.0.1:5432/eleicoes
      - Usar sqlachemy com text() para queries parametrizadas
      
      ## 4. queries/__init__.py
      Exportar todas as funções de query.
      
      ## 5. queries/catalogos.py
      Funções para listar opções dos filtros:
      - listar_anos() - DISTINCT ANO_ELEICAO de boletim_de_urna
      - listar_ufs(ano) - DISTINCT SG_UF filtrado por ano
      - listar_municipios(ano, uf) - DISTINCT CD_MUNICIPIO, NM_MUNICIPIO
      - listar_cargos(ano, uf, cd_municipio) - DISTINCT CD_CARGO_PERGUNTA, DS_CARGO_PERGUNTA
      - listar_candidatos(ano, uf, cd_municipio, cd_cargo) - NR_VOTAVEL, NM_VOTAVEL, SG_PARTIDO, SUM(QT_VOTOS)
      Todas cacheadas com @st.cache_data(ttl=3600)
      
      ## 6. queries/abas.py
      Funções para dados de cada aba:
      - resumo_candidato_municipio(ano, uf, cd_municipio, cd_cargo, nr_votavel) - métricas principais
      - votos_candidato_por_municipio(ano, uf, cd_cargo, nr_votavel) - para mapa do estado
      - votos_candidato_por_local(ano, uf, cd_municipio, cd_cargo, nr_votavel) - para mapa de bolhas
      - ranking_municipio(ano, uf, cd_municipio, cd_cargo) - top candidatos no município
      - sintese_territorial(ano, uf, cd_municipio, cd_cargo) - candidatos por locales liderados
      - top_candidatos_no_local(ano, uf, cd_municipio, cd_cargo, nr_local) - ranking em local específico
      - votos_por_bairro(ano, uf, cd_municipio, cd_cargo, nr_votavel) - drill-down por bairro
      - perfil_eleitorado_uf(ano, uf) - dados de abstenção por idade e escolaridade (se disponível)
      
      IMPORTANTE: Para dados inexistentes, criar placeholders que retornam DataFrames vazios
      com estrutura correta mas sem dados, e adicionar comentários sobre como obter os dados.
      
      ## 7. ui/__init__.py
      Exportar módulos de cada tab.
      
      ## 8. ui/components.py
      Componentes visuais reutilizáveis:
      - fmt_int(n) - formata números com separador de milhar brasileiro
      - fmt_pct(n) - formata percentual com vírgula
      - kpi(label, value, hint) - card de métrica
      - section_title(title, subtitle) - título de seção com barra azul
      - bar_row(name, party, votos, pct, rank) - linha de ranking com barra de progresso
      
      ## 9. ui/utils.py
      Funções utilitárias:
      - render_placeholder(message, suggestion) - renderiza mensagem de dados não disponíveis
      - check_data_availability(tab_name) - verifica se dados existem para a aba
      
      ## 10. config/__init__.py
      Configurações do projeto.
      
      ## 11. config/settings.py
      - Constantes de cores (azul institucional)
      - Configurações de layout
      - Mensagens de placeholder para dados faltantes
      
      ## 12. README.md
      Documentação básica do projeto com instruções de instalação e uso.
      
      Use a estrutura de queries do app-python original como referência, mas desacople completamente.
    assigned_to: general
    verified_by: ~
    verify_skip_reason: 'Infraestrutura base - módulos internos, não entrega direta ao usuário'
    timeout_ms: 600000

